# -----------------------------------------------------------------------------
# initialization.yaml – main configuration file for KWOK simulation setup
# -----------------------------------------------------------------------------
# ‣ Structure
#   • Defines parameters for each simulated cluster (member1, member2).
#   • Used by main.sh to configure fake nodes and autoscaler behavior.
#   • Values are parsed dynamically (via yq/jq) during infrastructure setup.
# -----------------------------------------------------------------------------

clusters:
  member1:
    nodes: 9           # Number of fake KWOK nodes to create for member1
    cpu: "64"          # CPU resources allocated per node (K8s format string)
    memory: "256Gi"      # Memory allocated per node (K8s format string)
    autoscaler: false  # Whether to deploy the Cluster Autoscaler on member1

  member2:
    nodes: 9           # Number of fake KWOK nodes to create for member2
    cpu: "64"           # CPU resources allocated per node (K8s format string)
    memory: "256Gi"      # Memory allocated per node (K8s format string)
    autoscaler: true   # Whether to deploy the Cluster Autoscaler on member2