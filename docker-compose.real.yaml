version: '3.8'

services:
    # Broker (same as before)
    broker:
        container_name: broker
        build:
            context: ./broker
            dockerfile: Dockerfile.api
        volumes:
            - type: bind
              source: ~/.kube/karmada.config
              target: /root/.kube/karmada.config
            - type: bind
              source: ~/.kube/members.config
              target: /root/.kube/members.config
        network_mode: "host"
        environment:
            - MODE=real
            - KWOK_MODE=false # Real mode: no KWOK tolerations

    # Monitor (same as before, adapts to both modes)
    monitor:
        container_name: monitor
        build:
            context: ./monitor
            dockerfile: Dockerfile
        network_mode: host

    # AI-Engine (same as before)
    ai-engine:
        container_name: ai-engine
        build:
            context: ./ai-engine
            dockerfile: Dockerfile.api
        network_mode: "host"

    # Actuator (same as before)
    actuator:
        container_name: actuator
        build:
            context: ./actuator
            dockerfile: Dockerfile.api
        volumes:
            - type: bind
              source: ~/.kube/karmada.config
              target: /root/.kube/config
        network_mode: "host"

    # MongoDB (same as before)
    mongo:
        container_name: mongo
        image: mongo:latest
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

networks:
    default:
        name: cloud-ai
        driver: bridge

volumes:
    mongo_data:
