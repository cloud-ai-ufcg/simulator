services:
    infra-environment:
        container_name: infra-environment
        build:
            context: ./scripts
            dockerfile: Dockerfile
        privileged: true
        restart: unless-stopped
        network_mode: "host"
        volumes:
            - ./simulator/data/config.yaml:/workspace/data/config.yaml
            - ~/.kube:/root/.kube
            - /var/run/docker.sock:/var/run/docker.sock

    broker:
        container_name: broker
        build:
            context: ./broker
            dockerfile: Dockerfile.api
        restart: unless-stopped
        volumes:
            - type: bind
              source: ~/.kube/karmada.config
              target: /root/.kube/karmada.config
            - type: bind
              source: ~/.kube/members.config
              target: /root/.kube/members.config
        network_mode: "host"
        expose:
            - "8081"
        depends_on:
            - mongo
            - infra-environment

    monitor:
        container_name: monitor
        build:
            context: ./monitor
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            - SIMULATOR_CONFIG=/app/simulator_config.yaml
        volumes:
            - type: bind
              source: ./simulator/data/config.yaml
              target: /app/simulator_config.yaml
        network_mode: host
        expose:
            - "8082"
        depends_on:
            - infra-environment
    
    ai-engine:
        container_name: ai-engine
        build:
            context: ./ai-engine
            dockerfile: Dockerfile.api
        restart: unless-stopped
        environment:
            - SIMULATOR_CONFIG=/app/simulator_config.yaml
            - GOOGLE_API_KEY=${GOOGLE_API_KEY}
            - GROQ_API_KEY=${GROQ_API_KEY}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
        volumes:
            - type: bind
              source: ./simulator/data/config.yaml
              target: /app/simulator_config.yaml
        network_mode: "host"
        expose:
            - "8083"
        depends_on:
            - monitor
            - actuator
    
    actuator:
        container_name: actuator
        build:
            context: ./actuator
            dockerfile: Dockerfile.apifront
        restart: unless-stopped
        environment:
            - SIMULATOR_CONFIG=/simulator/data/config.yaml
        volumes:
            - type: bind
              source: ~/.kube/karmada.config
              target: /root/.kube/config
            - type: bind
              source: ~/.kwok
              target: /root/.kwok
            - type: bind
              source: ./simulator/data/config.yaml
              target: /simulator/data/config.yaml
        network_mode: "host"
        expose:
            - "8084"
        depends_on:
            - mongo
            - infra-environment
    mongo:
        container_name: mongo
        image: mongo:latest
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

networks:
    default:
        name: cloud-ai
        driver: bridge

volumes:
    mongo_data:
    config_data:
