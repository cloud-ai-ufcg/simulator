services:
    broker:
        container_name: broker
        build:
            context: ./broker
            dockerfile: Dockerfile.api
        restart: unless-stopped
        volumes:
            - type: bind
              source: ~/.kube/karmada.config
              target: /root/.kube/karmada.config
            - type: bind
              source: ~/.kube/members.config
              target: /root/.kube/members.config
        network_mode: "host"
        depends_on:
            - mongo
        environment:
            - KWOK_MODE=false

    monitor:
        container_name: monitor
        build:
            context: ./monitor
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            - SIMULATOR_CONFIG=/app/simulator_config.yaml
            - KWOK_MODE=false
        volumes:
            - type: bind
              source: ./simulator/data/config.yaml
              target: /app/simulator_config.yaml
        network_mode: host
    ai-engine:
        container_name: ai-engine
        build:
            context: ./ai-engine
            dockerfile: Dockerfile.api
        restart: unless-stopped
        environment:
            - SIMULATOR_CONFIG=/app/simulator_config.yaml
            - GOOGLE_API_KEY=${GOOGLE_API_KEY}
            - GROQ_API_KEY=${GROQ_API_KEY}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
        volumes:
            - type: bind
              source: ./simulator/data/config.yaml
              target: /app/simulator_config.yaml
        network_mode: "host"
        depends_on:
            - monitor
            - actuator
    actuator:
        container_name: actuator
        build:
            context: ./actuator
            dockerfile: Dockerfile.api
        restart: unless-stopped
        environment:
            - SIMULATOR_CONFIG=/simulator/data/config.yaml
        volumes:
            - type: bind
              source: ~/.kube/karmada.config
              target: /root/.kube/config
            - type: bind
              source: ~/.kwok
              target: /root/.kwok
            - type: bind
              source: ./simulator/data/config.yaml
              target: /simulator/data/config.yaml
        network_mode: "host"
        depends_on:
            - mongo
    mongo:
        container_name: mongo
        image: mongo:latest
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

networks:
    default:
        name: cloud-ai
        driver: bridge

volumes:
    mongo_data:
    config_data:
