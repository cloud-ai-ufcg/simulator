# clusters initialzation
clusters:
  member1:
    nodes: 1
    cpu: "3"
    memory: "4Gi"
    autoscaler: false

  member2:
    nodes: 1
    cpu: "3"
    memory: "4Gi"
    autoscaler: false

# environment config
prometheus:
  grafana_enable: false

# morpheus config

# engine config
ai-engine:
  enabled: false
  scheduler_interval: 300
  timestamp_lookback_seconds: 600
  workloads_shard_size: 20
  monitored_duration_sec: 600

# monitor config
monitor:
  collection_interval: 30

# broker config
kubeconfig: "karmada.config"
namespace: "default"