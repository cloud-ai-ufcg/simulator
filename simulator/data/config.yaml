# clusters initialzation
clusters:
  member1:
    nodes: 2
    cpu: "8"
    memory: "16Gi"
    autoscaler: false

  member2:
    nodes: 2
    cpu: "8"
    memory: "16Gi"
    autoscaler: true

# environment config
prometheus:
  grafana_enable: false

# engine config
ai-engine:
  enabled: true
  data:
    input_json: monitor_outputs.json
  ai:
    selected_model: google/gemini-2.5-flash  # Selected model to be used
    scheduler_interval: 60           # Number of seconds between scheduler runs
    timestamp_lookback_seconds: 600   # Number of seconds to look back for metrics
    fetch_metrics_immediately: false   # Whether to fetch metrics immediately or wait for the scheduler
    
    multi_agent:
      selected_prompt: multi_agent_v3
      provider: openrouter
      graph_version: v1  # Options: 'v1' single agent or 'v2' multi-agent with performance, cost, and consolidator agents
      generation_config:
        temperature: 0.1
        max_output_tokens: 18000
      
      # V2 architecture configuration for multi-agent system:
      agents:
        cpu_checker:
          enabled: true
          weight: 1.0
        memory_checker:
          enabled: true
          weight: 1.0
        pending_checker:
          enabled: true
          weight: 1.5
      prompts:
        performance_prompt_file: performance_agent
        cost_prompt_file: cost_agent
        consolidator_prompt_file: consolidator_agent
    # Legacy default_config for backward compatibility
    default_config:
      provider: openrouter
      generation_config:
        temperature: 0.1
        max_output_tokens: 18000
    models:
      gemini:
        model_name: google/gemini-2.0-flash-001
        provider: google
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
      nemotron:
        model_name: nvidia/nemotron-nano-9b-v2
        provider: nvidia
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
      claude:
        model_name: anthropic/claude-3.5-sonnet
        provider: anthropic
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
      gpt-4o:
        model_name: openai/gpt-4o
        provider: openai
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
    cluster_selection: # Configuration for selecting clusters to analyze
      listed_clusters: [] # List of specific cluster labels to include. Empty means all clusters.
  paths:
    output_dir: ai-engine/data/output
    log_dir: ai-engine/logs
  logging:
    level: DEBUG
    file: ai_engine.log
  monitor:
    host: 0.0.0.0
    port: 8082
    route: metrics
  actuator:
    host: 0.0.0.0
    port: 8084
    route: apply
  server:
    host: 0.0.0.0
    port: 8083
    reload: false
  recommendation_history:
    enabled: false                    # Toggle feature on/off
    lookback_count: 3                 # Number of past history batches to consider
    mongodb:
      host: "localhost"               # MongoDB host address
      port: 27017                     # MongoDB port
      database: "ai_engine"           # MongoDB database name
      collection: "recommendation_history"  # MongoDB collection name

# monitor config
monitor:
  collection_interval: 30

# actuator config
actuator:
  orchestrator: karmada # karmada or morpheus
  server:
    port: 8084
  file:
    recommendations: recommendations_example.csv
  mode: auto  # Options: "auto" or "human-in-the-loop"
  morpheus:
    url: "https://CHANGE_ME_WITH_YOUR_MORPHEUS_URL"
    access_token: "CHANGE_ME_WITH_YOUR_MORPHEUS_ACCESS_TOKEN"
    refresh_token: "CHANGE_ME_WITH_YOUR_MORPHEUS_REFRESH_TOKEN"
    expires_in: 604800 # 7 days
    scope: "write"
    clusters: []