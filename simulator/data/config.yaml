# clusters initialzation
clusters:
  member1:
    nodes: 1
    cpu: "8"
    memory: "16Gi"
    autoscaler: false

  member2:
    nodes: 1
    cpu: "8"
    memory: "16Gi"
    autoscaler: true

  member3:
    nodes: 1
    cpu: "8"
    memory: "16Gi"
    autoscaler: false

# environment config
prometheus:
  grafana_enable: false

# engine config
ai-engine:
  enabled: true
  data:
    input_json: monitor_outputs.json
  ai:
    mode: multi_agent
    selected_model: x-ai/grok-4-fast
    scheduler_interval: 60
    timestamp_lookback_seconds: 600
    workloads_shard_size: 200
    fetch_metrics_immediately: false
    single_agent:
      selected_prompt: single_agent_v1
      provider: openrouter
      generation_config:
        temperature: 0.1
        max_output_tokens: 18000
    multi_agent:
      selected_prompt: multi_agent
      provider: openrouter
      generation_config:
        temperature: 0.1
        max_output_tokens: 18000
      agents:
        cpu_checker:
          enabled: true
          weight: 1.0
        memory_checker:
          enabled: true
          weight: 1.0
        pending_checker:
          enabled: true
          weight: 1.5
    default_config:
      provider: openrouter
      generation_config:
        temperature: 0.1
        max_output_tokens: 18000
    models:
      gemini:
        model_name: google/gemini-2.0-flash-001
        provider: google
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
      nemotron:
        model_name: nvidia/nemotron-nano-9b-v2
        provider: nvidia
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
      claude:
        model_name: anthropic/claude-3.5-sonnet
        provider: anthropic
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
      gpt-4o:
        model_name: openai/gpt-4o
        provider: openai
        generation_config:
          temperature: 0.1
          max_output_tokens: 6000
    cluster_selection:
      listed_clusters: []
  paths:
    output_dir: ai-engine/data/output
    log_dir: ai-engine/logs
  logging:
    level: DEBUG
    file: ai_engine.log
  monitor:
    host: 0.0.0.0
    port: 8082
    route: metrics
  actuator:
    host: 0.0.0.0
    port: 8084
    route: apply
  server:
    host: 0.0.0.0
    port: 8083
    reload: false

# monitor config
monitor:
  collection_interval: 30

# actuator config
actuator:
  orchestrator: karmada # karmada or morpheus
  server:
    port: 8084
  file:
    recommendations: recommendations_example.csv
  mode: auto  # Options: "auto" or "human-in-the-loop"
  morpheus:
    url: "https://CHANGE_ME_WITH_YOUR_MORPHEUS_URL"
    access_token: "CHANGE_ME_WITH_YOUR_MORPHEUS_ACCESS_TOKEN"
    refresh_token: "CHANGE_ME_WITH_YOUR_MORPHEUS_REFRESH_TOKEN"
    expires_in: 604800 # 7 days
    scope: "write"
    clusters: []